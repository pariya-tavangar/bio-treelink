<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pariya Treelink</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="cozy-card">
    <div class="avatar-wrap">
      <div class="pfp-frame">
        <img src="img/pfp.jpg" alt="profile photo" />
        <i class="fas fa-tree fallback-icon"></i>
      </div>
    </div>

    <h1 class="cozy-name">Pariya<span style="font-weight:300; margin-left:6px;">&nbsp;treelinks</span></h1>
    <div class="cozy-desc">
            Software Developer
    </div>

    <div class="links-container">
  
       <a href="https://www.jojogeek.ir">
      <div class="wood-link" style="display: flex; align-items: center; justify-content: space-between; padding-right: 0.8rem;">
        <div style="display: flex; align-items: center; gap: 0.9rem; flex: 1;">
          <i class="fas fa-pen-fancy"></i>
          <span>Jojogeek Weblog</span>
        </div>
        <button class="copy-btn" data-url="https://www.jojogeek.ir" aria-label="Copy weblog link">
          <i class="fas fa-copy"></i>
        </button>
      </div></a>

      <a href="https://www.pariya-tavangar.ir">
      <div class="wood-link" style="display: flex; align-items: center; justify-content: space-between; padding-right: 0.8rem;">
        <div style="display: flex; align-items: center; gap: 0.9rem; flex: 1;">
          <i class="fas fa-globe"></i>
          <span>Personal Website</span>
        </div>
        <button class="copy-btn" data-url="https://www.pariya-tavangar.ir" aria-label="Copy website link">
          <i class="fas fa-copy"></i>
        </button>
      </div>
      </a>


      <div class="wood-link donation-link" style="padding-right: 0.8rem;">
        <div class="donation-row" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <div style="display: flex; align-items: center; gap: 35px; flex: 1;">
            <i class="fas fa-heart" style="color:#8b3a3a;"></i>
            <span>Donation (Ton)</span>
          </div>
          <button class="copy-btn" data-url="UQDwhFSv434Ub4qu8kjO3HeGSYMG-ISOhAjf_gQNDmR_FjC2" aria-label="Copy TON wallet address">
            <i class="fas fa-copy"></i>
          </button>
        </div>
        <div class="donation-barcode-wrapper">
          <img 
            src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=UQDwhFSv434Ub4qu8kjO3HeGSYMG-ISOhAjf_gQNDmR_FjC2&bgcolor=fcf5e8&color=2b1e20&margin=12" 
            alt="TON wallet donation QR code"
            class="barcode-img"
            loading="lazy"
          />
          <span class="barcode-label">scan to donate</span>
        </div>
      </div>
    </div>


    <div class="social-roots">
      <a href="https://www.instagram.com/pariya_ins" class="social-link" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://t.me/jojogeek" class="social-link" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
      <a href="https://github.com/pariya-tavangar" class="social-link" aria-label="Github"><i class="fab fa-github"></i></a>
    </div>

    <div class="moss-note">
      <span>All Rights Reserved</span>
    </div>
  </div>


  <script src="scripts/script.js"></script>
</body>
</html>
